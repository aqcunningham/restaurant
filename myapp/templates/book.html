{% extends 'base.html' %}
{% load static %}

{% block content %}
<section>
  <article>
    <h1> Make Reservation </h1>

    <!--Begin row-->
    <div class="row">
      <!--Begin col-->
      <div class="column">
        <form id="form">
          {% csrf_token %}
		  <!-- the form.as_p is limited: generates all the HTML fields automatically from BookingForm -->
          <!-- {{form.as_p}} -->
		<p>
			<label for="first_name">Name:</label>
			<input type="text" placeholder="Your Name" maxlength="200" required="" id="first_name">
		</p>
		<p>
			<label for="reservation_date" required="">When: </label>
			<input type="date" id="reservation_date">
		</p>
		<p>
            <label for="reservation_slot" required="">Time: </label>
          	<select id="reservation_slot" name="reservation_slot">
        	<option value="0" disabled>Select time</option>
            </select>
        </p>
		<p>
			<label for="number_of_guests" required="">Guests:</label>
			<input type="number" value="2" min="1" max="50" id="number_of_guests">
		</p>
		<p>
			<label for="occasion">Occasion: </label>
			<!-- <input type="text" placeholder="What are we celebrating?" max_length="200"> -->
			<textarea name="" id="occasion" placeholder="What are we celebrating?"></textarea>
		</p>
		 <!-- input submit was used previously to automtialcally submit all fields-->
		<!-- <input type="submit" id="button"> -->
		 <!-- now, we use: -->
		<button type="button" id="button">Reserve</button>

        </form>
      </div>
      <!--End col-->

      <!--Begin col-->
    <div class="column">
        <div class="videowrap">
			<h2>Bookings For <span id="today"></span></h2>
        		<!-- <div id="bookings"> -->
				<!-- <img src="{% static 'map.png' %}" alt="Restaurant location map" style="width: 800px; height: auto;"> -->
  			    <!-- </div> -->
				 <div id="bookings"></div>
      	</div>
      <!--End col-->
    </div>
    <!--End row-->




  </article>
</section>

<script>
// console.log("Hello");
const date = new Date()
document.getElementById('reservation_date').value = `${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate().toString().padStart(2, "0")}`
console.log(document.getElementById('reservation_date').value)
getBookings()

document.getElementById('reservation_date').addEventListener('change',
function () {
	getBookings()
}
);

function getBookings() {
    let reserved_slots = []
    const date = document.getElementById('reservation_date').value
    document.getElementById('today').innerHTML = date
    
    fetch("{% url 'bookings' %}" + '?date=' + date)
      .then(r => r.json())
      .then(data => {
        reserved_slots = []
        bookings = ''

		for (let item of data) {
			console.log(item.fields)
			reserved_slots.push(item.fields.reservation_slot)
			bookings += `<p>${item.fields.first_name} - ${formatTime(item.fields.reservation_slot)}</p>`
		}
	    
		let slot_options = '<option value="0" disabled>Select time</option>'
		// from 3pm to latest 9pm to rsvp table
		for (let i = 15; i <22; i++){
			const label = formatTime(i)
			if (reserved_slots.includes(i)){
				slot_options += `<option value=${i} disabled>${label}</option>`
			} else {
				slot_options += `<option value=${i}>${label}</option>`
			}
		} 
		
		document.getElementById('reservation_slot').innerHTML = slot_options
        if(bookings==''){
          bookings = "No bookings"
        }
        document.getElementById('bookings').innerHTML = bookings
      })
  }		
	
function formatTime(time) {
    const ampm = time < 12 ? 'AM' : 'PM'
    const t = time < 12 ? time : time > 12 ? time - 12 : time
    const label = `${t} ${ampm}`
    return label
}


document.getElementById('button').addEventListener('click', function (e) {
    const formdata = {
      first_name: document.getElementById('first_name').value,
      reservation_date: document.getElementById('reservation_date').value,
      reservation_slot: document.getElementById('reservation_slot').value,
    }

    fetch("{% url 'all_bookings' %}", { method: 'post', body: JSON.stringify(formdata) })
      .then(r => r.text())
      .then(data => {
        getBookings()
      })
  })		
	

</script>
{% endblock %}
